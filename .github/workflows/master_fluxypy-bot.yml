name: Build and deploy Node.js app to Azure Web App - fluxypy-bot

on:
push:
branches:
- master
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest
permissions:
contents: read

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Node.js
    uses: actions/setup-node@v3
    with:
      node-version: "22.x"

  - name: Install pnpm
    run: npm install -g pnpm

  - name: Install dependencies and build API
    run: |
      cd apps/api
      pnpm install
      npx prisma generate
      pnpm run build

  - name: Upload artifact for deployment
    uses: actions/upload-artifact@v4
    with:
      name: node-app
      path: apps/api
```

deploy:
runs-on: ubuntu-latest
needs: build

```
steps:
  - name: Download artifact from build job
    uses: actions/download-artifact@v4
    with:
      name: node-app

  - name: Deploy to Azure Web App
    id: deploy-to-webapp
    uses: azure/webapps-deploy@v3
    with:
      app-name: "fluxypy-bot"
      slot-name: "Production"
      package: .
      publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_51178F1C546D41E5B5CC637A07D7D4DC }}
```
